<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHYL</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      background: #0d0d0b;
      color: #f7f7ef;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #app { padding: 18px; }
    h1 { margin: 0 0 4px; font-size: 20px; }
    p { color: #a8a89c; font-size: 13px; line-height: 1.45; }
    label { display: block; margin: 12px 0 5px; color: #c8c8bc; font-size: 12px; }
    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 10px;
      background: #171713;
      color: #fff;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 800;
    }

    .primary { margin-top: 14px; background: #d6ff3f; color: #111; }
    .secondary { margin-top: 8px; background: #22221d; color: #f7f7ef; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
    .stat { padding: 10px; border-radius: 12px; background: #171713; }
    .stat strong { display: block; color: #d6ff3f; font-size: 17px; }
    .stat span { color: #a8a89c; font-size: 11px; }
    .error { color: #ff8a8a; }
    .toggle-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0 8px;
      padding: 12px;
      border-radius: 12px;
      background: #171713;
      cursor: pointer;
    }
    .toggle-row strong { display: block; font-size: 13px; color: #f7f7ef; margin-bottom: 4px; }
    .toggle-row small { display: block; color: #a8a89c; font-size: 11px; line-height: 1.4; font-weight: 400; }
    .toggle-row input {
      width: auto;
      margin-top: 2px;
      accent-color: #d6ff3f;
    }
    .privacy-link { margin: 0 0 12px; font-size: 12px; }
    .privacy-link a { color: #d6ff3f; }
  </style>
</head>
<body>
  <main id="app"></main>
  <script src="popup.js"></script>
</body>
</html>
