<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #10130d;
    }
    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #10130d;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline webkit-playsinline loop preload="auto"></video>
  <script>
    const params = new URLSearchParams(location.search);
    const primary = params.get('url');
    // Bundled fallbacks — never depend on external CDNs from the player.
    const FALLBACKS = [
      'media/3jane.mp4',
      'media/factory.mp4',
      'media/switchlabs.mp4',
      'media/collective.mp4',
    ].map((file) => {
      try { return chrome.runtime.getURL(file); } catch { return file; }
    });
    const video = document.getElementById('video');
    let attempt = 0;
    const queue = [primary, ...FALLBACKS].filter(Boolean);

    function load(src) {
      if (!src) return;
      video.src = src;
      video.muted = true;
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');
      video.load();
      const tryPlay = () => {
        const result = video.play();
        if (result && result.catch) result.catch(() => {});
      };
      video.addEventListener('canplay', tryPlay, { once: true });
      tryPlay();
    }

    video.addEventListener('error', () => {
      attempt += 1;
      if (attempt < queue.length) load(queue[attempt]);
    });

    load(queue[0]);
  </script>
</body>
</html>
